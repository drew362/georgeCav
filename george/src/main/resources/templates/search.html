<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="Поиск"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
<header th:insert="blocks/header::header"></header>

<div class="container mt-5">
    <form action="/search" method="get">
        <h3> Поиск:</h3>
        <input type="text" name="query" placeholder="Введите номер или имя" class="form-control">
        <button type="submit" class="btn btn-success">Поиск</button>
    </form>
</div>

<!-- Вывод сообщений -->
<div id="message" th:if="${message != null}" class="alert alert-warning mt-4" role="alert">
    <span th:text="${message}"></span>
</div>

<div class="container mt-4" th:unless="${#lists.isEmpty(products)}">
    <!-- Цикл по найденным кавалерам -->
    <div th:each="el : ${products}" class="alert alert-info mt-2 shadow-sm">
        <!-- Добавили явное приведение к строке th:text="${'№ ' + el.number}" -->
        <h3 th:text="${'Георгиевский крест № ' + el.number}"></h3>

        <!-- Выводим ФИО жирным шрифтом -->
        <h5 class="fw-bold text-dark" th:text="${el.name}"></h5>

        <!-- Описание подвига -->
        <p class="text-muted" th:text="${el.description}"></p>
    </div>
</div>

<div th:fragment="footer">
    <footer th:insert="blocks/footer::footer"></footer>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var messageElement = document.getElementById('message');

        if (messageElement) {
            setTimeout(function () {
                messageElement.style.display = 'none';
            }, 20000); // 20 секунд (в миллисекундах)
        }
    });
</script>

</body>
</html>
